spring.application.name=bookingservice
server.port=8085
spring.datasource.url=jdbc:mysql://localhost:3306/bookingservicedb
spring.datasource.username=root
spring.datasource.password=test

spring.jpa.hibernate.ddl-auto=update

# Circuit Breaker
resilience4j.circuitbreaker.instances.bookingService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.bookingService.sliding-window-size=4
resilience4j.circuitbreaker.instances.bookingService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.bookingService.minimum-number-of-calls=2

# Actuator

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#twillio
twilio.account-sid=xxxxxxxxxx
twilio.auth-token=xxxxxxxxxxx
twilio.from-number=xxxxxxxxx